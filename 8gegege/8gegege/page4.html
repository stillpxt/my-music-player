<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>越来越年轻</title>
  <style>
    * { box-sizing: border-box; }
    body {
      --page-bg-y: 18%;
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      background-image:
        linear-gradient(120deg, rgba(8, 14, 34, 0.44), rgba(8, 14, 34, 0.2)),
        url("./assets/media/background/bg_004.jpg");
      background-size: cover;
      background-position: center var(--page-bg-y);
      background-repeat: no-repeat;
      color: #ffffff;
      display: grid;
      place-items: center;
      padding: clamp(14px, 3vw, 24px);
      transition: background-size 0.35s ease, background-position 0.35s ease, padding 0.35s ease;
    }
    body.full-bg-view {
      background-size: contain;
      background-position: center center;
      padding: 0;
    }
    .card {
      width: min(860px, 96vw);
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 20px;
      padding: clamp(16px, 2.4vw, 24px);
      box-shadow: 0 16px 36px rgba(8, 14, 34, 0.2);
    }
    body.full-bg-view .card,
    body.full-bg-view .side-nav,
    body.full-bg-view .side-nav-stack,
    body.full-bg-view .dock-player {
      opacity: 0;
      pointer-events: none;
    }
    .bg-viewer {
      position: fixed;
      inset: 0;
      z-index: 35;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      background: linear-gradient(120deg, rgba(8, 14, 34, 0.44), rgba(8, 14, 34, 0.2));
      cursor: grab;
      touch-action: none;
    }
    .bg-viewer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      transform-origin: center;
      user-select: none;
      -webkit-user-drag: none;
    }
    body.full-bg-view .bg-viewer {
      opacity: 1;
      pointer-events: auto;
    }
    .top-title-box {
      margin-bottom: 10px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      text-align: center;
      font-size: clamp(1rem, 2vw, 1.08rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 10px 14px;
    }
    .top-search {
      margin-bottom: 12px;
    }
    .top-search-form {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      padding: 6px 8px 6px 12px;
    }
    .top-search-input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: #ffffff;
      font-size: 0.9rem;
      font-family: inherit;
    }
    .top-search-input::placeholder {
      color: rgba(255, 255, 255, 0.72);
    }
    .top-search-btn {
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.16);
      color: #ffffff;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
    }
    .top-search-btn svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      align-items: center;
      justify-items: end;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
    }
    .hero-cover {
      width: 112px;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      background-image: url("./assets/media/background/bg_001.jpg");
      background-size: cover;
      background-position: center;
      box-shadow: 0 8px 18px rgba(53, 75, 145, 0.18);
    }
    .hero-meta h1 {
      margin: 0;
      font-size: clamp(1.15rem, 2.6vw, 1.48rem);
      color: #ffffff;
    }
    .hero-meta p {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.88);
      font-size: clamp(0.84rem, 1.7vw, 0.92rem);
    }
    .play-all {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(120deg, #ff4d67, #ff6a52);
      color: #ffffff;
      font-size: 0.9rem;
      padding: 10px 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 8px 18px rgba(255, 95, 98, 0.28);
    }
    .play-all svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
    .song-list {
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid rgba(255, 255, 255, 0.24);
    }
    .song-item {
      display: grid;
      grid-template-columns: 28px 56px 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding: 12px 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.24);
    }
    .song-rank {
      font-weight: 700;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      font-size: 0.98rem;
    }
    .song-thumb {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      box-shadow: 0 6px 14px rgba(53, 75, 145, 0.12);
    }
    .song-thumb.s1 { background-image: url("./assets/media/background/bg_001.jpg"); }
    .song-thumb.s2 { background-image: url("./assets/media/background/bg_004.jpg"); }
    .song-thumb.s3 { background-image: url("./assets/media/background/bg_006.jpg"); }
    .song-main {
      min-width: 0;
    }
    .song-title {
      margin: 0;
      font-size: clamp(0.95rem, 1.8vw, 1.03rem);
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-sub {
      margin: 5px 0 0;
      font-size: 0.84rem;
      color: rgba(255, 255, 255, 0.75);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-time {
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.84rem;
      margin-right: 4px;
    }
    .song-play {
      border: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    .song-play svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      transform: translateX(1px);
    }
    .audio-wrap {
      margin-top: 14px;
      padding-top: 12px;
    }
    .audio-label {
      margin: 0 0 8px;
      font-size: 0.92rem;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
    }
    .audio-player {
      width: min(100%, 560px);
      display: block;
    }
    .page-nav {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .page-arrow {
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      padding: 0;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(6, 10, 26, 0.2);
      text-decoration: none;
      display: grid;
      place-items: center;
    }
    .page-arrow svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
    }
    .side-nav {
      position: fixed;
      top: 50%;
      width: 43px;
      height: 43px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 50%;
      background: transparent;
      backdrop-filter: blur(6px);
      color: rgba(255, 255, 255, 0.9);
      display: grid;
      place-items: center;
      text-decoration: none;
      z-index: 30;
      opacity: 0.52;
      box-shadow: 0 8px 18px rgba(6, 10, 26, 0.22);
      transition: background-color 0.22s ease, border-color 0.22s ease, transform 0.22s ease, opacity 0.22s ease, box-shadow 0.22s ease;
    }
    .side-nav::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid rgba(130, 170, 255, 0.75);
      opacity: 0;
      transform: scale(0.9);
      pointer-events: none;
    }
    .side-nav:hover,
    .side-nav:focus-visible {
      background: transparent;
      border-color: rgba(255, 255, 255, 0.55);
      opacity: 1;
      box-shadow: 0 10px 22px rgba(6, 10, 26, 0.3);
    }
    .side-nav::before {
      content: "";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 72px;
    }
    .side-nav-prev {
      left: 0;
      transform: translate(-62%, -50%) scale(0.94);
    }
    .side-nav-prev::before {
      left: 100%;
    }
    .side-nav-prev:hover,
    .side-nav-prev:focus-visible,
    .side-nav-prev.near-edge {
      transform: translate(-8%, -50%) scale(1);
    }
    .side-nav-stack {
      position: fixed;
      top: 50%;
      right: 0;
      display: grid;
      gap: 10px;
      z-index: 30;
      transform: translate(62%, -50%) scale(0.94);
      transition: transform 0.22s ease;
    }
    .side-nav-stack::before {
      content: "";
      position: absolute;
      right: 100%;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 100%;
    }
    .side-nav-stack:hover,
    .side-nav-stack:focus-within,
    .side-nav-stack.near-edge {
      transform: translate(8%, -50%) scale(1);
    }
    .side-nav-next,
    .side-nav-top,
    .side-nav-bottom {
      position: relative;
      top: auto;
      right: auto;
      transform: none;
    }
    .side-nav-next::before,
    .side-nav-top::before,
    .side-nav-bottom::before {
      display: none;
    }
    .side-nav-next:hover,
    .side-nav-next:focus-visible,
    .side-nav-top:hover,
    .side-nav-top:focus-visible,
    .side-nav-bottom:hover,
    .side-nav-bottom:focus-visible {
      transform: scale(1.06);
    }
    .side-nav-stack .side-nav.is-near {
      transform: scale(1.12);
      opacity: 1;
      background: transparent;
      color: rgba(255, 255, 255, 0.98);
      border-color: rgba(154, 188, 255, 0.96);
      box-shadow: 0 12px 24px rgba(80, 122, 255, 0.28);
    }
    .side-nav-stack .side-nav.is-near::after {
      opacity: 1;
      animation: navWave 1.1s ease-out infinite;
    }
    .side-nav svg {
      width: 42%;
      height: 42%;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
    }
    @keyframes navWave {
      from {
        transform: scale(0.92);
        opacity: 0.62;
      }
      to {
        transform: scale(1.8);
        opacity: 0;
      }
    }
    @media (max-width: 640px) {
      .hero {
        grid-template-columns: 84px 1fr;
      }
      .hero-cover {
        width: 84px;
      }
      .play-all {
        grid-column: 1 / -1;
        justify-self: end;
      }
      .song-item {
        grid-template-columns: 24px 48px 1fr auto;
      }
      .song-time {
        display: none;
      }
      .song-thumb {
        width: 48px;
        height: 48px;
      }
    }
    @media (max-width: 760px) {
      .side-nav {
        width: 38px;
        height: 38px;
      }
      .side-nav-stack {
        gap: 8px;
        transform: translate(58%, -50%) scale(0.94);
      }
      .side-nav-stack:hover,
      .side-nav-stack:focus-within,
      .side-nav-stack.near-edge {
        transform: translate(8%, -50%) scale(1);
      }
    }
  </style>
</head>
<body>
  <a id="pageTop"></a>
  <a class="side-nav side-nav-prev" href="./page3.html" aria-label="前往上一网页">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M15 5l-7 7 7 7"></path>
    </svg>
  </a>
  <div class="side-nav-stack">
    <a class="side-nav side-nav-top" href="#pageTop" aria-label="回到顶部">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 15l7-7 7 7"></path>
      </svg>
    </a>
    <a class="side-nav side-nav-next" href="./page5.html" aria-label="前往下一网页">

      <form class="top-search-form" action="#" method="get">

        <button class="top-search-btn" type="submit" aria-label="搜索">

    <ul class="song-list">
      <li class="song-item">
        <span class="song-rank">01</span>

          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5v14l11-7z"></path>
          </svg>
        </button>
      </li>
      <li class="song-item">
        <span class="song-rank">02</span>
        <div class="song-thumb s2"></div>
        <div class="song-main">
          <p class="song-title">回忆慢放</p>
          <p class="song-sub">8歌歌歌 · 现场改编</p>
        </div>
        <span class="song-time">04:18</span>
        <button class="song-play" type="button" data-src="./assets/media/audio/audio_003.mp3" aria-label="播放回忆慢放">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5v14l11-7z"></path>
          </svg>
        </button>
      </li>
      <li class="song-item">
        <span class="song-rank">03</span>
        <div class="song-thumb s3"></div>
        <div class="song-main">
          <p class="song-title">告白练习曲</p>
          <p class="song-sub">8歌歌歌 · 温柔版</p>
        </div>
        <span class="song-time">03:40</span>
        <button class="song-play" type="button" data-src="./assets/media/audio/audio_003.mp3" aria-label="播放告白练习曲">

    <div class="page-nav">
      <a class="page-arrow" href="./page3.html" aria-label="上一页：网页3">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 5l-7 7 7 7"></path>
        </svg>
      </a>
      <a class="page-arrow" href="./page5.html" aria-label="下一页：网页5">

  <a id="pageBottom"></a>
  <script>
    const player = new Audio("./assets/media/audio/audio_003.mp3");
    player.preload = "metadata";
    const sideNavPrev = document.querySelector(".side-nav-prev");
    const sideNavStack = document.querySelector(".side-nav-stack");
    const rightNavButtons = sideNavStack ? Array.from(sideNavStack.querySelectorAll(".side-nav")) : [];
    const CROSS_PAGE_PLAYER_TRANSFER_KEY = "cross_page_player_transfer";
    function restoreCrossPagePlayback() {
      let transfer = null;
      try {
        transfer = JSON.parse(sessionStorage.getItem(CROSS_PAGE_PLAYER_TRANSFER_KEY) || "null");
      } catch {
        transfer = null;
      }
      sessionStorage.removeItem(CROSS_PAGE_PLAYER_TRANSFER_KEY);
      if (!transfer || typeof transfer.src !== "string" || !transfer.src) {
        return;
      }
      player.src = transfer.src;
      const baseProgress = Number(transfer.progress || 0);
      const startedAt = Number(transfer.startedAt || 0);
      const elapsed = startedAt > 0 ? Math.max(0, (Date.now() - startedAt) / 1000) : 0;
      const targetTime = Math.max(0, baseProgress + elapsed);
      player.addEventListener("loadedmetadata", () => {
        if (targetTime <= 0) {
          return;
        }
        const safeTime = Number.isFinite(player.duration)
          ? Math.min(targetTime, Math.max(player.duration - 0.05, 0))
          : targetTime;
        player.currentTime = safeTime;
      }, { once: true });
      player.play().catch(() => {});
    }
    function clearRightNear() {
      rightNavButtons.forEach((button) => button.classList.remove("is-near"));
    }
    document.getElementById("playAllBtn").addEventListener("click", () => {
      player.src = "./assets/media/audio/audio_003.mp3";
      player.play().catch(() => {});
    });
    document.querySelectorAll(".song-play").forEach((button) => {
      button.addEventListener("click", () => {
        player.src = button.dataset.src;
        player.play().catch(() => {});
      });
    });
    document.addEventListener("pointermove", (event) => {
      const x = event.clientX;
      const y = event.clientY;
      const threshold = Math.max(120, Math.floor(window.innerWidth * 0.14));
      const nearLeft = x <= threshold;
      const nearRight = x >= window.innerWidth - threshold;
      if (sideNavPrev) {
        sideNavPrev.classList.toggle("near-edge", nearLeft);
      }
      if (!sideNavStack) {
        return;
      }
      sideNavStack.classList.toggle("near-edge", nearRight);
      if (!nearRight || rightNavButtons.length === 0) {
        clearRightNear();
        return;
      }
      let nearestIndex = 0;
      let nearestDistance = Number.POSITIVE_INFINITY;
      rightNavButtons.forEach((button, index) => {
        const rect = button.getBoundingClientRect();
        const centerY = rect.top + rect.height / 2;
        const distance = Math.abs(y - centerY);
        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearestIndex = index;
        }
      });
      rightNavButtons.forEach((button, index) => {
        button.classList.toggle("is-near", index === nearestIndex);
      });
    });
    window.addEventListener("blur", () => {
      if (sideNavPrev) {
        sideNavPrev.classList.remove("near-edge");
      }
      if (sideNavStack) {
        sideNavStack.classList.remove("near-edge");
      }
      clearRightNear();
    });
    restoreCrossPagePlayback();
    (() => {
      let bgPosY = 18;
      const minY = 6;
      const maxY = 94;
      const speed = 0.03;
      let revealProgress = 0;
      const enterThreshold = 2000;
      let viewScale = 1;
      let viewOffsetX = 0;
      let viewOffsetY = 0;
      let isBgDragging = false;
      let dragStartX = 0;
      let dragStartY = 0;
      let dragBaseOffsetX = 0;
      let dragBaseOffsetY = 0;
      let initialPinchDistance = 0;
      let initialPinchScale = 1;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function getDistance(touches) {
        if (touches.length < 2) return 0;
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
      }
      const bgViewer = document.createElement("div");
      bgViewer.className = "bg-viewer";
      const bgViewerImage = document.createElement("img");
      bgViewerImage.alt = "背景图";
      bgViewerImage.src = "./assets/media/background/bg_004.jpg";
      bgViewer.appendChild(bgViewerImage);
      document.body.appendChild(bgViewer);
      function renderViewerTransform() {
        bgViewerImage.style.transform = `translate(${viewOffsetX}px, ${viewOffsetY}px) scale(${viewScale})`;
      }
      function setFullBgView(enabled) {
        document.body.classList.toggle("full-bg-view", enabled);
        if (!enabled) {
          revealProgress = 0;
          viewScale = 1;
          viewOffsetX = 0;
          viewOffsetY = 0;
          renderViewerTransform();
        }
      }
      renderViewerTransform();
      bgViewer.addEventListener("touchstart", (event) => {
        if (!document.body.classList.contains("full-bg-view")) {
          return;
        }
        if (event.touches.length === 2) {
          initialPinchDistance = getDistance(event.touches);
          initialPinchScale = viewScale;
          event.preventDefault();
        } else if (event.touches.length === 1) {
          isBgDragging = true;
          dragStartX = event.touches[0].clientX;
          dragStartY = event.touches[0].clientY;
          dragBaseOffsetX = viewOffsetX;
          dragBaseOffsetY = viewOffsetY;
        }
      }, { passive: false });

      bgViewer.addEventListener("touchmove", (event) => {
        if (!document.body.classList.contains("full-bg-view")) {
          return;
        }
        event.preventDefault(); // Prevent default for both pinch and drag
        if (event.touches.length === 2) {
          const currentDistance = getDistance(event.touches);
          if (initialPinchDistance > 0) {
            const scaleChange = currentDistance / initialPinchDistance;
            viewScale = clamp(initialPinchScale * scaleChange, 0.4, 5.0);
            renderViewerTransform();
          }
        } else if (event.touches.length === 1 && isBgDragging) {
          viewOffsetX = clamp(dragBaseOffsetX + event.touches[0].clientX - dragStartX, -900, 900);
          viewOffsetY = clamp(dragBaseOffsetY + event.touches[0].clientY - dragStartY, -900, 900);
          renderViewerTransform();
        }
      }, { passive: false });

      bgViewer.addEventListener("touchend", () => {
        isBgDragging = false;
      });

      window.addEventListener("wheel", (event) => {
        const inFullBgView = document.body.classList.contains("full-bg-view");
        if (inFullBgView) {
          event.preventDefault();
          viewScale = clamp(viewScale - event.deltaY * 0.0013, 0.4, 4.5);
          renderViewerTransform();
          return;
        }
        bgPosY = Math.min(maxY, Math.max(minY, bgPosY + event.deltaY * speed));
        document.body.style.setProperty("--page-bg-y", `${bgPosY}%`);
        revealProgress = Math.min(enterThreshold, revealProgress + Math.abs(event.deltaY) * 0.5);
        if (revealProgress >= enterThreshold) {
          setFullBgView(true);
        }
      }, { passive: false });

      bgViewer.addEventListener("mousedown", (event) => {
        if (!document.body.classList.contains("full-bg-view")) {
          return;
        }
        isBgDragging = true;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        dragBaseOffsetX = viewOffsetX;
        dragBaseOffsetY = viewOffsetY;
        bgViewer.style.cursor = "grabbing";
        event.preventDefault();
      });

      window.addEventListener("mousemove", (event) => {
        if (!isBgDragging) {
          return;
        }
        viewOffsetX = clamp(dragBaseOffsetX + event.clientX - dragStartX, -900, 900);
        viewOffsetY = clamp(dragBaseOffsetY + event.clientY - dragStartY, -900, 900);
        renderViewerTransform();
      });

      window.addEventListener("mouseup", () => {
        if (!isBgDragging) {
          return;
        }
        isBgDragging = false;
        bgViewer.style.cursor = "grab";
      });
      bgViewer.addEventListener("dblclick", () => {
        if (!document.body.classList.contains("full-bg-view")) {
          return;
        }
        setFullBgView(false);
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && document.body.classList.contains("full-bg-view")) {
          setFullBgView(false);
        }
      });
    })();
  </script>
  <script>
    (() => {
      const styleId = "globalDockPlayerStyle";
      if (!document.getElementById(styleId)) {
        const style = document.createElement("style");
        style.id = styleId;
        style.textContent = `
          .dock-player {
            position: fixed;
            left: 50%;
            bottom: max(8px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            width: fit-content;
            max-width: calc(100vw - clamp(12px, 3vw, 32px));
            min-height: clamp(52px, 7.4vw, 72px);
            border-radius: clamp(10px, 1.2vw, 12px);
            border: 1px solid rgba(255, 255, 255, 0.78);
            background: transparent;
            backdrop-filter: blur(6px);
            box-shadow: none;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: clamp(6px, 1.4vw, 12px);
            padding: clamp(6px, 1.1vw, 10px) clamp(8px, 1.6vw, 14px);
            z-index: 40;
            cursor: grab;
            user-select: none;
            touch-action: none;
          }
          .dock-player-main {
            display: grid;
            grid-template-columns: clamp(34px, 4.8vw, 48px) minmax(0, 1fr);
            align-items: center;
            gap: clamp(6px, 1.2vw, 10px);
            min-width: 0;
          }
          .dock-cover {
            width: clamp(34px, 4.8vw, 48px);
            height: clamp(34px, 4.8vw, 48px);
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.52);
            box-shadow: none;
          }
          .dock-meta {
            min-width: 0;
          }
          .dock-title {
            margin: 0;
            font-size: clamp(0.9rem, 2.1vw, 1rem);
            color: rgba(255, 255, 255, 0.96);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 700;
          }
          .dock-sub {
            margin: 2px 0 0;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.76);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }
          .dock-controls {
            display: flex;
            align-items: center;
            gap: clamp(4px, 1vw, 8px);
          }
          .dock-btn {
            width: clamp(30px, 4vw, 38px);
            height: clamp(30px, 4vw, 38px);
            border-radius: 8px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.95);
            display: grid;
            place-items: center;
            cursor: pointer;
            padding: 0;
          }
          .dock-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
          }
          .dock-btn.play svg {
            width: 18px;
            height: 18px;
          }
          .dock-btn.fav.active {
            color: rgba(255, 255, 255, 1);
            background: transparent;
          }
          @media (max-width: 640px) {
            .dock-player {
              width: calc(100vw - 8px);
              padding: 8px;
              gap: 6px;
            }
            .dock-player-main {
              grid-template-columns: 36px minmax(0, 1fr);
              gap: 7px;
            }
            .dock-cover {
              width: 36px;
              height: 36px;
            }
            .dock-btn {
              width: 32px;
              height: 32px;
            }
            .dock-btn svg {
              width: 16px;
              height: 16px;
            }
            .dock-btn.play svg {
              width: 18px;
              height: 18px;
            }
          }
        `;
        document.head.appendChild(style);
      }

      const oldPlayer = document.querySelector(".bottom-player");
      if (oldPlayer) {
        oldPlayer.style.display = "none";
      }

      const host = document.createElement("section");
      host.className = "dock-player";
      host.setAttribute("aria-label", "底部播放器");
      host.innerHTML = `
        <div class="dock-player-main">
          <img class="dock-cover" alt="当前歌曲封面" src="./assets/media/background/bg_001.jpg" />
          <div class="dock-meta">
            <p class="dock-title">ONE's hope（唯一的希望） - やなぎなぎ</p>
            <p class="dock-sub">透明悬浮播放器</p>
          </div>
        </div>
        <div class="dock-controls">
          <button class="dock-btn prev" type="button" aria-label="上一曲"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L10 12l8 6"></path><path d="M6 6v12"></path></svg></button>
          <button class="dock-btn play" type="button" aria-label="播放"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg></button>
          <button class="dock-btn next" type="button" aria-label="下一曲"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l8 6-8 6"></path><path d="M18 6v12"></path></svg></button>
          <button class="dock-btn fav" type="button" aria-label="收藏"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.53z"></path></svg></button>
        </div>
        <audio preload="none"></audio>
      `;
      document.body.appendChild(host);
      const edgeGap = Math.max(6, Math.round(window.innerHeight * 0.01));
      let isDockDragging = false;
      let dragStartY = 0;
      let hostStartTop = 0;
      host.addEventListener("mousedown", (event) => {
        if (event.button !== 0 || event.target.closest(".dock-controls")) {
          return;
        }
        const rect = host.getBoundingClientRect();
        isDockDragging = true;
        dragStartY = event.clientY;
        hostStartTop = rect.top;
        host.style.bottom = "auto";
        host.style.top = `${rect.top}px`;
        host.style.cursor = "grabbing";
        event.preventDefault();
      });
      window.addEventListener("mousemove", (event) => {
        if (!isDockDragging) {
          return;
        }
        const hostHeight = host.offsetHeight;
        const boundedTop = Math.min(window.innerHeight - hostHeight - edgeGap, Math.max(edgeGap, hostStartTop + event.clientY - dragStartY));
        host.style.top = `${boundedTop}px`;
      });
      window.addEventListener("mouseup", () => {
        if (!isDockDragging) {
          return;
        }
        isDockDragging = false;
        host.style.cursor = "grab";
      });
      window.addEventListener("resize", () => {
        if (!host.style.top) {
          return;
        }
        const hostHeight = host.offsetHeight;
        const currentTop = Number.parseFloat(host.style.top) || edgeGap;
        const boundedTop = Math.min(window.innerHeight - hostHeight - edgeGap, Math.max(edgeGap, currentTop));
        host.style.top = `${boundedTop}px`;
      });
      const audio = host.querySelector("audio");
      const cover = host.querySelector(".dock-cover");
      const title = host.querySelector(".dock-title");
      const sub = host.querySelector(".dock-sub");
      const prevBtn = host.querySelector(".dock-btn.prev");
      const playBtn = host.querySelector(".dock-btn.play");
      const nextBtn = host.querySelector(".dock-btn.next");
      const favBtn = host.querySelector(".dock-btn.fav");
      const tracks = [
        { title: "ONE's hope（唯一的希望） - やなぎなぎ", sub: "audio_003.mp3", src: "./assets/media/audio/audio_003.mp3", cover: "./assets/media/background/bg_001.jpg" },
        { title: "夜幕写诗", sub: "audio_003.mp3", src: "./assets/media/audio/audio_003.mp3", cover: "./assets/media/background/bg_004.jpg" },
        { title: "银河旅人", sub: "audio_003.mp3", src: "./assets/media/audio/audio_003.mp3", cover: "./assets/media/background/bg_006.jpg" }
      ];
      const favKey = "global_dock_player_favorites";
      const playIcon = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>`;
      const pauseIcon = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5h3v14H8z"></path><path d="M13 5h3v14h-3z"></path></svg>`;
      let currentIndex = 0;

      function readFavMap() {
        try {
          const raw = localStorage.getItem(favKey);
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      function writeFavMap(map) {
        localStorage.setItem(favKey, JSON.stringify(map));
      }

      function renderFavState() {
        const map = readFavMap();
        const active = Boolean(map[tracks[currentIndex].src]);
        favBtn.classList.toggle("active", active);
        favBtn.setAttribute("aria-label", active ? "取消收藏" : "收藏");
      }

      function renderPlayState() {
        const paused = audio.paused;
        playBtn.innerHTML = paused ? playIcon : pauseIcon;
        playBtn.setAttribute("aria-label", paused ? "播放" : "暂停");
      }

      function renderTrack(resetTime = true) {
        const track = tracks[currentIndex];
        if (audio.src !== new URL(track.src, window.location.href).href) {
          audio.src = track.src;
        }
        if (resetTime) {
          audio.currentTime = 0;
        }
        cover.src = track.cover;
        title.textContent = track.title;
        sub.textContent = track.sub;
        renderFavState();
      }

      function switchTrack(step) {
        currentIndex = (currentIndex + step + tracks.length) % tracks.length;
        const shouldPlay = !audio.paused;
        renderTrack(true);
        if (shouldPlay) {
          audio.play().catch(() => {});
        }
      }

      prevBtn.addEventListener("click", () => switchTrack(-1));
      nextBtn.addEventListener("click", () => switchTrack(1));
      playBtn.addEventListener("click", () => {
        if (audio.paused) {
          audio.play().catch(() => {});
        } else {
          audio.pause();
        }
      });
      favBtn.addEventListener("click", () => {
        const map = readFavMap();
        const src = tracks[currentIndex].src;
        map[src] = !map[src];
        writeFavMap(map);
        renderFavState();
      });
      audio.addEventListener("ended", () => {
        switchTrack(1);
        audio.play().catch(() => {});
      });
      audio.addEventListener("play", renderPlayState);
      audio.addEventListener("pause", renderPlayState);
      renderTrack(true);
      renderPlayState();
    })();
  </script>
</body>
</html>

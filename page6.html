<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <style>
    * { box-sizing: border-box; }
    body {
      --page-bg-y: 18%;
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      background-image:
        linear-gradient(120deg, rgba(6, 10, 26, 0.5), rgba(6, 10, 26, 0.36)),

      background-position: center var(--page-bg-y);

      color: #ffffff;
      display: grid;
      place-items: center;
      padding: clamp(16px, 3vw, 24px);

    }
    body.full-bg-view {
      background-size: contain;
      background-position: center center;
      padding: 0;
    }
    .card {
      width: min(760px, 94vw);
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 16px;
      padding: clamp(14px, 2.8vw, 24px);
      box-shadow: 0 12px 30px rgba(6, 10, 26, 0.18);
      display: grid;
      gap: 14px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
    }
    body.full-bg-view .card,
    body.full-bg-view .side-nav,
    body.full-bg-view .side-nav-stack,
    body.full-bg-view .dock-player {
      opacity: 0;
      pointer-events: none;
    }
    .bg-viewer {
      position: fixed;
      inset: 0;
      z-index: 35;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      background: linear-gradient(120deg, rgba(6, 10, 26, 0.5), rgba(6, 10, 26, 0.36));
      cursor: grab;
      touch-action: none;
    }
    .bg-viewer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      transform-origin: center;
      user-select: none;
      -webkit-user-drag: none;
    }
    body.full-bg-view .bg-viewer {
      opacity: 1;
      pointer-events: auto;
    }
    .row {
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 14px;
      padding: clamp(12px, 2.2vw, 16px);
      background: transparent;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2.6vw, 1.32rem);
      color: #ffffff;
    }
    p {
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.7;
      font-size: clamp(0.88rem, 1.8vw, 0.96rem);
    }
    .intro-list {
      margin: 10px 0 0;
      padding-left: 18px;
      line-height: 1.85;
      color: #ffffff;
      font-size: clamp(0.86rem, 1.7vw, 0.94rem);
    }
    .forum-form {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }
    .forum-input,
    .forum-textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: clamp(0.86rem, 1.7vw, 0.92rem);
      font-family: inherit;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
    }
    .forum-input::placeholder,
    .forum-textarea::placeholder {
      color: rgba(255, 255, 255, 0.74);
    }
    .forum-textarea {
      min-height: 92px;
      resize: vertical;
    }
    .forum-media-row {
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
    }
    .forum-file {
      width: 100%;
      border: 1px dashed rgba(255, 255, 255, 0.42);
      border-radius: 10px;
      padding: 8px 10px;
      color: rgba(255, 255, 255, 0.88);
      background: rgba(255, 255, 255, 0.06);
      font-size: clamp(0.8rem, 1.55vw, 0.88rem);
      font-family: inherit;
    }
    .forum-file::file-selector-button {
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
      padding: 5px 10px;
      margin-right: 10px;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .forum-file-count {
      margin: 0;
      color: rgba(255, 255, 255, 0.76);
      font-size: clamp(0.78rem, 1.45vw, 0.84rem);
      white-space: nowrap;
    }
    .forum-btn {
      justify-self: start;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
      padding: 8px 14px;
      font-size: clamp(0.84rem, 1.7vw, 0.9rem);
      cursor: pointer;
    }
    .forum-list {
      margin: 12px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }
    .forum-item,
    .forum-empty {
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.08);
      padding: 10px 12px;
      color: #ffffff;
      font-size: clamp(0.84rem, 1.7vw, 0.9rem);
    }
    .forum-empty {
      color: rgba(255, 255, 255, 0.76);
    }
    .forum-item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .forum-author {
      font-weight: 700;
      color: #ffffff;
    }
    .forum-time {
      color: rgba(255, 255, 255, 0.7);
      font-size: clamp(0.74rem, 1.4vw, 0.8rem);
      white-space: nowrap;
    }
    .forum-text {
      margin-top: 6px;
      white-space: pre-wrap;
      word-break: break-word;
      color: rgba(255, 255, 255, 0.92);
      line-height: 1.72;
      font-size: clamp(0.84rem, 1.65vw, 0.9rem);
    }
    .forum-media {
      margin-top: 8px;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }
    .forum-media img,
    .forum-media video {
      width: 100%;
      max-height: 220px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      object-fit: cover;
      background: rgba(6, 10, 26, 0.24);
    }
    .forum-media video {
      object-fit: contain;
      background: rgba(6, 10, 26, 0.4);
    }
    .bottom-nav {
      margin-top: 2px;
      display: flex;
      justify-content: center;
    }
    .back-arrow {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.42);
      box-shadow: 0 8px 18px rgba(6, 10, 26, 0.2);
      display: grid;
      place-items: center;
      text-decoration: none;
      color: #ffffff;
    }
    .back-arrow svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
    }
    .side-nav {
      position: fixed;
      top: 50%;
      width: 43px;
      height: 43px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 50%;
      background: transparent;
      backdrop-filter: blur(6px);
      color: rgba(255, 255, 255, 0.9);
      display: grid;
      place-items: center;
      text-decoration: none;
      z-index: 30;
      opacity: 0.52;
      box-shadow: 0 8px 18px rgba(6, 10, 26, 0.22);
      transition: background-color 0.22s ease, border-color 0.22s ease, transform 0.22s ease, opacity 0.22s ease, box-shadow 0.22s ease;
    }
    .side-nav::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid rgba(130, 170, 255, 0.75);
      opacity: 0;
      transform: scale(0.9);
      pointer-events: none;
    }
    .side-nav:hover,
    .side-nav:focus-visible {
      background: transparent;
      border-color: rgba(255, 255, 255, 0.55);
      opacity: 1;
      box-shadow: 0 10px 22px rgba(6, 10, 26, 0.3);
    }
    .side-nav::before {
      content: "";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 72px;
    }
    .side-nav-prev {
      left: 0;
      transform: translate(-62%, -50%) scale(0.94);
    }
    .side-nav-prev::before {
      left: 100%;
    }
    .side-nav-prev:hover,
    .side-nav-prev:focus-visible,
    .side-nav-prev.near-edge {
      transform: translate(-8%, -50%) scale(1);
    }
    .side-nav-stack {
      position: fixed;
      top: 50%;
      right: 0;
      display: grid;
      gap: 10px;
      z-index: 30;
      transform: translate(62%, -50%) scale(0.94);
      transition: transform 0.22s ease;
    }
    .side-nav-stack::before {
      content: "";
      position: absolute;
      right: 100%;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 100%;
    }
    .side-nav-stack:hover,
    .side-nav-stack:focus-within,
    .side-nav-stack.near-edge {
      transform: translate(8%, -50%) scale(1);
    }
    .side-nav-next,
    .side-nav-top,
    .side-nav-bottom {
      position: relative;
      top: auto;
      right: auto;
      transform: none;
    }
    .side-nav-next::before,
    .side-nav-top::before,
    .side-nav-bottom::before {
      display: none;
    }
    .side-nav-next:hover,
    .side-nav-next:focus-visible,
    .side-nav-top:hover,
    .side-nav-top:focus-visible,
    .side-nav-bottom:hover,
    .side-nav-bottom:focus-visible {
      transform: scale(1.06);
    }
    .side-nav-stack .side-nav.is-near {
      transform: scale(1.12);
      opacity: 1;
      background: transparent;
      color: rgba(255, 255, 255, 0.98);
      border-color: rgba(154, 188, 255, 0.96);
      box-shadow: 0 12px 24px rgba(80, 122, 255, 0.28);
    }
    .side-nav-stack .side-nav.is-near::after {
      opacity: 1;
      animation: navWave 1.1s ease-out infinite;
    }
    .side-nav svg {
      width: 42%;
      height: 42%;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
    }
    @keyframes navWave {
      from {
        transform: scale(0.92);
        opacity: 0.62;
      }
      to {
        transform: scale(1.8);
        opacity: 0;
      }
    }
    @media (max-width: 760px) {
      .side-nav {
        width: 38px;
        height: 38px;
      }
      .side-nav-stack {
        gap: 8px;
        transform: translate(58%, -50%) scale(0.94);
      }
      .side-nav-stack:hover,
      .side-nav-stack:focus-within,
      .side-nav-stack.near-edge {
        transform: translate(8%, -50%) scale(1);
      }
    }
  </style>
</head>

      <form id="forumForm" class="forum-form" action="#" method="post">

  <script id="communityFeedData" type="application/json">[
    { "title": "今晚聊天室话题", "meta": "社区动态 · 7.9千讨论", "cover": "./assets/media/background/bg_006.jpg", "hot": "🔥 2.5万", "publishedAt": "2026-03-15T21:30:00+08:00" },
    { "title": "翻唱挑战榜单", "meta": "社区动态 · 1.8万讨论", "cover": "./assets/media/background/bg_005.jpg", "hot": "🔥 4.2万", "publishedAt": "2026-03-14T20:20:00+08:00" },
    { "title": "本周热帖精选", "meta": "社区动态 · 9.6千讨论", "cover": "./assets/media/background/bg_003.jpg", "hot": "🔥 2.8万", "publishedAt": "2026-03-12T18:40:00+08:00" },
    { "title": "打卡挑战 Day 07", "meta": "社区动态 · 1.2万讨论", "cover": "./assets/media/background/bg_002.jpg", "hot": "🔥 3.1万", "publishedAt": "2026-03-10T10:15:00+08:00" }
  ]</script>
  <script>
    const sideNavPrev = document.querySelector(".side-nav-prev");
    const sideNavStack = document.querySelector(".side-nav-stack");
    const rightNavButtons = sideNavStack ? Array.from(sideNavStack.querySelectorAll(".side-nav")) : [];
    const forumForm = document.getElementById("forumForm");
    const forumNickname = document.getElementById("forumNickname");
    const forumText = document.getElementById("forumText");
    const forumMediaInput = document.getElementById("forumMediaInput");
    const forumFileCount = document.getElementById("forumFileCount");
    const forumList = document.getElementById("forumList");
    const FORUM_STORAGE_KEY = "page6_forum_posts";
    const forumSeeds = [
      { id: "seed_1", nickname: "小宇", text: "希望下次更新《千千阙歌》翻唱版。", createdAt: "2026-03-12T21:15:00+08:00", media: [] },
      { id: "seed_2", nickname: "阿晴", text: "直播氛围很好，期待更多互动环节。", createdAt: "2026-03-13T19:40:00+08:00", media: [] }
    ];
    function formatForumTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return "";
      }
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      return `${y}-${m}-${d} ${hh}:${mm}`;
    }
    function normalizeForumPost(item) {
      if (!item || typeof item !== "object") {
        return null;
      }
      const nickname = String(item.nickname || "匿名用户").trim().slice(0, 20) || "匿名用户";
      const text = String(item.text || "").trim().slice(0, 500);
      const createdAt = item.createdAt || new Date().toISOString();
      const sourceMedia = Array.isArray(item.media) ? item.media : [];
      const media = sourceMedia
        .filter((asset) => asset && typeof asset.src === "string" && asset.src)
        .map((asset) => ({
          type: asset.type === "video" ? "video" : "image",
          src: String(asset.src)
        }));
      if (!text && media.length === 0) {
        return null;
      }
      return {
        id: String(item.id || `${Date.now()}_${Math.random().toString(16).slice(2)}`),
        nickname,
        text,
        createdAt,
        media
      };
    }
    function readForumPosts() {
      try {
        const raw = localStorage.getItem(FORUM_STORAGE_KEY);
        if (!raw) {
          return forumSeeds.map((item) => ({ ...item, media: [] }));
        }
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) {
          return forumSeeds.map((item) => ({ ...item, media: [] }));
        }
        const normalized = parsed.map(normalizeForumPost).filter(Boolean);
        return normalized.length > 0 ? normalized : forumSeeds.map((item) => ({ ...item, media: [] }));
      } catch {
        return forumSeeds.map((item) => ({ ...item, media: [] }));
      }
    }
    function writeForumPosts(posts) {
      localStorage.setItem(FORUM_STORAGE_KEY, JSON.stringify(posts));
    }
    function renderForumPosts(posts) {
      forumList.innerHTML = "";
      if (posts.length === 0) {
        const empty = document.createElement("li");
        empty.className = "forum-empty";
        empty.textContent = "还没有帖子，来发布第一条吧";
        forumList.appendChild(empty);
        return;
      }
      [...posts].reverse().forEach((post) => {
        const item = document.createElement("li");
        item.className = "forum-item";
        const head = document.createElement("div");
        head.className = "forum-item-head";
        const author = document.createElement("span");
        author.className = "forum-author";
        author.textContent = post.nickname;
        const time = document.createElement("span");
        time.className = "forum-time";
        time.textContent = formatForumTime(post.createdAt);
        head.appendChild(author);
        head.appendChild(time);
        item.appendChild(head);
        if (post.text) {
          const text = document.createElement("p");
          text.className = "forum-text";
          text.textContent = post.text;
          item.appendChild(text);
        }
        if (post.media.length > 0) {
          const mediaWrap = document.createElement("div");
          mediaWrap.className = "forum-media";
          post.media.forEach((asset) => {
            if (asset.type === "video") {
              const video = document.createElement("video");
              video.src = asset.src;
              video.controls = true;
              video.preload = "metadata";
              mediaWrap.appendChild(video);
              return;
            }
            const image = document.createElement("img");
            image.src = asset.src;
            image.alt = `${post.nickname} 发布的图片`;
            mediaWrap.appendChild(image);
          });
          item.appendChild(mediaWrap);
        }
        forumList.appendChild(item);
      });
    }
    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("read_failed"));
        reader.readAsDataURL(file);
      });
    }
    async function collectForumMedia(files) {
      const accepted = Array.from(files)
        .filter((file) => file.type.startsWith("image/") || file.type.startsWith("video/"))
        .slice(0, 3);
      const assets = [];
      for (const file of accepted) {
        if (file.size > 6 * 1024 * 1024) {
          continue;
        }
        try {
          const src = await fileToDataUrl(file);
          assets.push({
            type: file.type.startsWith("video/") ? "video" : "image",
            src
          });
        } catch {
          continue;
        }
      }
      return assets;
    }
    let forumPosts = readForumPosts();
    renderForumPosts(forumPosts);
    forumMediaInput.addEventListener("change", () => {
      const count = forumMediaInput.files ? forumMediaInput.files.length : 0;
      forumFileCount.textContent = count > 0 ? `已选择 ${count} 个文件` : "未选择文件";
    });
    forumForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const nickname = (forumNickname.value || "").trim().slice(0, 20) || "匿名用户";
      const text = (forumText.value || "").trim().slice(0, 500);
      const media = await collectForumMedia(forumMediaInput.files || []);
      if (!text && media.length === 0) {
        return;
      }
      const post = normalizeForumPost({
        id: `${Date.now()}_${Math.random().toString(16).slice(2)}`,
        nickname,
        text,
        createdAt: new Date().toISOString(),
        media
      });
      if (!post) {
        return;
      }
      forumPosts.push(post);
      if (forumPosts.length > 40) {
        forumPosts = forumPosts.slice(forumPosts.length - 40);
      }
      try {
        writeForumPosts(forumPosts);
      } catch {
      }
      renderForumPosts(forumPosts);
      forumText.value = "";
      forumMediaInput.value = "";
      forumFileCount.textContent = "未选择文件";
    });
    function clearRightNear() {
      rightNavButtons.forEach((button) => button.classList.remove("is-near"));
    }
    document.addEventListener("pointermove", (event) => {
      const x = event.clientX;
      const y = event.clientY;
      const threshold = Math.max(120, Math.floor(window.innerWidth * 0.14));
      const nearLeft = x <= threshold;
      const nearRight = x >= window.innerWidth - threshold;
      if (sideNavPrev) {
        sideNavPrev.classList.toggle("near-edge", nearLeft);
      }
      if (!sideNavStack) {
        return;
      }
      sideNavStack.classList.toggle("near-edge", nearRight);
      if (!nearRight || rightNavButtons.length === 0) {
        clearRightNear();
        return;
      }
      let nearestIndex = 0;
      let nearestDistance = Number.POSITIVE_INFINITY;
      rightNavButtons.forEach((button, index) => {
        const rect = button.getBoundingClientRect();
        const centerY = rect.top + rect.height / 2;
        const distance = Math.abs(y - centerY);
        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearestIndex = index;
        }
      });
      rightNavButtons.forEach((button, index) => {
        button.classList.toggle("is-near", index === nearestIndex);
      });
    });
    window.addEventListener("blur", () => {
      if (sideNavPrev) {
        sideNavPrev.classList.remove("near-edge");
      }
      if (sideNavStack) {
        sideNavStack.classList.remove("near-edge");
      }
      clearRightNear();
    });
    document.getElementById("backToPage2").addEventListener("click", (event) => {
      event.preventDefault();
      sessionStorage.setItem("allowPage2", "1");
      window.location.href = "./page2.html";
    });
    (() => {
      let bgPosY = 18;
      const minY = 6;
      const maxY = 94;
      const speed = 0.03;
      let revealProgress = 0;
      const enterThreshold = 2000;
      let viewScale = 1;
      let viewOffsetX = 0;
      let viewOffsetY = 0;
      let isBgDragging = false;
      let dragStartX = 0;
      let dragStartY = 0;
      let dragBaseOffsetX = 0;
      let dragBaseOffsetY = 0;
      let initialPinchDistance = 0;
      let initialPinchScale = 1;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function getDistance(touches) {
        if (touches.length < 2) return 0;
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
      }
      const bgViewer = document.createElement("div");
      bgViewer.className = "bg-viewer";
      const bgViewerImage = document.createElement("img");
      bgViewerImage.alt = "背景图";
      bgViewerImage.src = "./assets/media/background/bg_006.jpg";
      bgViewer.appendChild(bgViewerImage);
      document.body.appendChild(bgViewer);
      function renderViewerTransform() {
        bgViewerImage.style.transform = `translate(${viewOffsetX}px, ${viewOffsetY}px) scale(${viewScale})`;
      }
      function setFullBgView(enabled) {
        document.body.classList.toggle("full-bg-view", enabled);
        if (!enabled) {
          revealProgress = 0;
          viewScale = 1;
          viewOffsetX = 0;
          viewOffsetY = 0;
          renderViewerTransform();
        }
      }
      renderViewerTransform();
      bgViewer.addEventListener("touchstart", (event) => {
        if (!document.body.classList.contains("full-bg-view")) {
          return;
        }
        if (event.touches.length === 2) {
          initialPinchDistance = getDistance(event.touches);
          initialPinchScale = viewScale;
          event.preventDefault();
        } else if (event.touches.length === 1) {
          isBgDragging = true;
          dragStartX = event.touches[0].clientX;
          dragStartY = event.touches[0].clientY;
          dragBaseOffsetX = viewOffsetX;
          dragBaseOffsetY = viewOffsetY;
        }
      }, { passive: false });

      bgViewer.addEventListener("touchmove", (event) => {
        if (!document.body.classList.contains("full-bg-view")) {
          return;
        }
        event.preventDefault(); // Prevent default for both pinch and drag
        if (event.touches.length === 2) {
          const currentDistance = getDistance(event.touches);
          if (initialPinchDistance > 0) {
            const scaleChange = currentDistance / initialPinchDistance;
            viewScale = clamp(initialPinchScale * scaleChange, 0.4, 5.0);
            renderViewerTransform();
          }
        } else if (event.touches.length === 1 && isBgDragging) {
          viewOffsetX = clamp(dragBaseOffsetX + event.touches[0].clientX - dragStartX, -900, 900);
          viewOffsetY = clamp(dragBaseOffsetY + event.touches[0].clientY - dragStartY, -900, 900);
          renderViewerTransform();
        }
      }, { passive: false });

      bgViewer.addEventListener("touchend", () => {
        isBgDragging = false;
      });

      window.addEventListener("wheel", (event) => {
        const inFullBgView = document.body.classList.contains("full-bg-view");
        if (inFullBgView) {
          event.preventDefault();
          viewScale = clamp(viewScale - event.deltaY * 0.0013, 0.4, 4.5);
          renderViewerTransform();
          return;
        }
        bgPosY = Math.min(maxY, Math.max(minY, bgPosY + event.deltaY * speed));
        document.body.style.setProperty("--page-bg-y", `${bgPosY}%`);
        revealProgress = Math.min(enterThreshold, revealProgress + Math.abs(event.deltaY) * 0.5);
        if (revealProgress >= enterThreshold) {
          setFullBgView(true);
        }
      }, { passive: false });

      bgViewer.addEventListener("mousedown", (event) => {
        if (!document.body.classList.contains("full-bg-view")) {
          return;
        }
        isBgDragging = true;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        dragBaseOffsetX = viewOffsetX;
        dragBaseOffsetY = viewOffsetY;
        bgViewer.style.cursor = "grabbing";
        event.preventDefault();
      });

      window.addEventListener("mousemove", (event) => {
        if (!isBgDragging) {
          return;
        }
        viewOffsetX = clamp(dragBaseOffsetX + event.clientX - dragStartX, -900, 900);
        viewOffsetY = clamp(dragBaseOffsetY + event.clientY - dragStartY, -900, 900);
        renderViewerTransform();
      });

      window.addEventListener("mouseup", () => {
        if (!isBgDragging) {
          return;
        }
        isBgDragging = false;
        bgViewer.style.cursor = "grab";
      });
      bgViewer.addEventListener("dblclick", () => {
        if (!document.body.classList.contains("full-bg-view")) {
          return;
        }
        setFullBgView(false);
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && document.body.classList.contains("full-bg-view")) {
          setFullBgView(false);
        }
      });
    })();
  </script>
  <script>
    (() => {
      const styleId = "globalDockPlayerStyle";
      if (!document.getElementById(styleId)) {
        const style = document.createElement("style");
        style.id = styleId;
        style.textContent = `
          .dock-player {
            position: fixed;
            left: 50%;
            bottom: max(8px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            width: fit-content;
            max-width: calc(100vw - clamp(12px, 3vw, 32px));
            min-height: clamp(52px, 7.4vw, 72px);
            border-radius: clamp(10px, 1.2vw, 12px);
            border: 1px solid rgba(255, 255, 255, 0.78);
            background: transparent;
            backdrop-filter: blur(6px);
            box-shadow: none;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: clamp(6px, 1.4vw, 12px);
            padding: clamp(6px, 1.1vw, 10px) clamp(8px, 1.6vw, 14px);
            z-index: 40;
            cursor: grab;
            user-select: none;
            touch-action: none;
          }
          .dock-player-main {
            display: grid;
            grid-template-columns: clamp(34px, 4.8vw, 48px) minmax(0, 1fr);
            align-items: center;
            gap: clamp(6px, 1.2vw, 10px);
            min-width: 0;
          }
          .dock-cover {
            width: clamp(34px, 4.8vw, 48px);
            height: clamp(34px, 4.8vw, 48px);
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.52);
            box-shadow: none;
          }
          .dock-meta {
            min-width: 0;
          }
          .dock-title {
            margin: 0;
            font-size: clamp(0.9rem, 2.1vw, 1rem);
            color: rgba(255, 255, 255, 0.96);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 700;
          }
          .dock-sub {
            margin: 2px 0 0;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.76);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }
          .dock-controls {
            display: flex;
            align-items: center;
            gap: clamp(4px, 1vw, 8px);
          }
          .dock-btn {
            width: clamp(30px, 4vw, 38px);
            height: clamp(30px, 4vw, 38px);
            border-radius: 8px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.95);
            display: grid;
            place-items: center;
            cursor: pointer;
            padding: 0;
          }
          .dock-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
          }
          .dock-btn.play svg {
            width: 18px;
            height: 18px;
          }
          .dock-btn.fav.active {
            color: rgba(255, 255, 255, 1);
            background: transparent;
          }
          @media (max-width: 640px) {
            .dock-player {
              width: calc(100vw - 8px);
              padding: 8px;
              gap: 6px;
            }
            .dock-player-main {
              grid-template-columns: 36px minmax(0, 1fr);
              gap: 7px;
            }
            .dock-cover {
              width: 36px;
              height: 36px;
            }
            .dock-btn {
              width: 32px;
              height: 32px;
            }
            .dock-btn svg {
              width: 16px;
              height: 16px;
            }
            .dock-btn.play svg {
              width: 18px;
              height: 18px;
            }
          }
        `;
        document.head.appendChild(style);
      }

      const oldPlayer = document.querySelector(".bottom-player");
      if (oldPlayer) {
        oldPlayer.style.display = "none";
      }

      const host = document.createElement("section");
      host.className = "dock-player";
      host.setAttribute("aria-label", "底部播放器");
      host.innerHTML = `
        <div class="dock-player-main">
          <img class="dock-cover" alt="当前歌曲封面" src="./assets/media/background/bg_001.jpg" />
          <div class="dock-meta">
            <p class="dock-title">ONE's hope（唯一的希望） - やなぎなぎ</p>
            <p class="dock-sub">透明悬浮播放器</p>
          </div>
        </div>
        <div class="dock-controls">
          <button class="dock-btn prev" type="button" aria-label="上一曲"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L10 12l8 6"></path><path d="M6 6v12"></path></svg></button>
          <button class="dock-btn play" type="button" aria-label="播放"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg></button>
          <button class="dock-btn next" type="button" aria-label="下一曲"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l8 6-8 6"></path><path d="M18 6v12"></path></svg></button>
          <button class="dock-btn fav" type="button" aria-label="收藏"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.53z"></path></svg></button>
        </div>
        <audio preload="none"></audio>
      `;
      document.body.appendChild(host);
      const edgeGap = Math.max(6, Math.round(window.innerHeight * 0.01));
      let isDockDragging = false;
      let dragStartY = 0;
      let hostStartTop = 0;
      host.addEventListener("mousedown", (event) => {
        if (event.button !== 0 || event.target.closest(".dock-controls")) {
          return;
        }
        const rect = host.getBoundingClientRect();
        isDockDragging = true;
        dragStartY = event.clientY;
        hostStartTop = rect.top;
        host.style.bottom = "auto";
        host.style.top = `${rect.top}px`;
        host.style.cursor = "grabbing";
        event.preventDefault();
      });
      window.addEventListener("mousemove", (event) => {
        if (!isDockDragging) {
          return;
        }
        const hostHeight = host.offsetHeight;
        const boundedTop = Math.min(window.innerHeight - hostHeight - edgeGap, Math.max(edgeGap, hostStartTop + event.clientY - dragStartY));
        host.style.top = `${boundedTop}px`;
      });
      window.addEventListener("mouseup", () => {
        if (!isDockDragging) {
          return;
        }
        isDockDragging = false;
        host.style.cursor = "grab";
      });
      window.addEventListener("resize", () => {
        if (!host.style.top) {
          return;
        }
        const hostHeight = host.offsetHeight;
        const currentTop = Number.parseFloat(host.style.top) || edgeGap;
        const boundedTop = Math.min(window.innerHeight - hostHeight - edgeGap, Math.max(edgeGap, currentTop));
        host.style.top = `${boundedTop}px`;
      });
      const audio = host.querySelector("audio");
      const cover = host.querySelector(".dock-cover");
      const title = host.querySelector(".dock-title");
      const sub = host.querySelector(".dock-sub");
      const prevBtn = host.querySelector(".dock-btn.prev");
      const playBtn = host.querySelector(".dock-btn.play");
      const nextBtn = host.querySelector(".dock-btn.next");
      const favBtn = host.querySelector(".dock-btn.fav");
      const tracks = [
        { title: "ONE's hope（唯一的希望） - やなぎなぎ", sub: "audio_001.mp3", src: "./assets/media/audio/audio_001.mp3", cover: "./assets/media/background/bg_001.jpg" },
        { title: "夜幕写诗", sub: "audio_002.mp3", src: "./assets/media/audio/audio_002.mp3", cover: "./assets/media/background/bg_004.jpg" },
        { title: "银河旅人", sub: "audio_003.mp3", src: "./assets/media/audio/audio_003.mp3", cover: "./assets/media/background/bg_006.jpg" }
      ];
      const favKey = "global_dock_player_favorites";
      const playIcon = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>`;
      const pauseIcon = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5h3v14H8z"></path><path d="M13 5h3v14h-3z"></path></svg>`;
      let currentIndex = 0;

      function readFavMap() {
        try {
          const raw = localStorage.getItem(favKey);
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      function writeFavMap(map) {
        localStorage.setItem(favKey, JSON.stringify(map));
      }

      function renderFavState() {
        const map = readFavMap();
        const active = Boolean(map[tracks[currentIndex].src]);
        favBtn.classList.toggle("active", active);
        favBtn.setAttribute("aria-label", active ? "取消收藏" : "收藏");
      }

      function renderPlayState() {
        const paused = audio.paused;
        playBtn.innerHTML = paused ? playIcon : pauseIcon;
        playBtn.setAttribute("aria-label", paused ? "播放" : "暂停");
      }

      function renderTrack(resetTime = true) {
        const track = tracks[currentIndex];
        if (audio.src !== new URL(track.src, window.location.href).href) {
          audio.src = track.src;
        }
        if (resetTime) {
          audio.currentTime = 0;
        }
        cover.src = track.cover;
        title.textContent = track.title;
        sub.textContent = track.sub;
        renderFavState();
      }

      function switchTrack(step) {
        currentIndex = (currentIndex + step + tracks.length) % tracks.length;
        const shouldPlay = !audio.paused;
        renderTrack(true);
        if (shouldPlay) {
          audio.play().catch(() => {});
        }
      }

      prevBtn.addEventListener("click", () => switchTrack(-1));
      nextBtn.addEventListener("click", () => switchTrack(1));
      playBtn.addEventListener("click", () => {
        if (audio.paused) {
          audio.play().catch(() => {});
        } else {
          audio.pause();
        }
      });
      favBtn.addEventListener("click", () => {
        const map = readFavMap();
        const src = tracks[currentIndex].src;
        map[src] = !map[src];
        writeFavMap(map);
        renderFavState();
      });
      audio.addEventListener("ended", () => {
        switchTrack(1);
        audio.play().catch(() => {});
      });
      audio.addEventListener("play", renderPlayState);
      audio.addEventListener("pause", renderPlayState);
      renderTrack(true);
      renderPlayState();
    })();
  </script>

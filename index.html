<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8歌歌歌 </title>
  <style>
    :root {
      --text: #ffffff;
      --cover-image: url("./assets/media/background/bg_001.jpg");
      --bg-pos-x:50%;
      --bg-pos-y: 0%;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
    }

    .page-1 {
      position: relative;
      overflow: hidden;
      min-height: 100vh;
      min-height: 100svh;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
      cursor: pointer;
      touch-action: none;
      transition: opacity 0.25s ease;
    }
    body.full-bg-view .page-1,
    body.full-bg-view .dock-player {
      opacity: 0;
      pointer-events: none;
    }
    .bg-viewer {
      position: fixed;
      inset: 0;
      z-index: 35;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      background: linear-gradient(120deg, rgba(4, 9, 28, 0.58), rgba(4, 9, 28, 0.38));
      cursor: grab;
      touch-action: none;
    }
    .bg-viewer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      transform-origin: center;
      user-select: none;
      -webkit-user-drag: none;
    }
    body.full-bg-view .bg-viewer {
      opacity: 1;
      pointer-events: auto;
    }

    .page-1::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(120deg, rgba(4, 9, 28, 0.58), rgba(4, 9, 28, 0.38)),
        var(--cover-image);
      background-size: cover;
      background-position: var(--bg-pos-x) var(--bg-pos-y);
      background-repeat: no-repeat;
      transform: scale(1.12);
      transform-origin: center top;
      transition: background-position 0.16s linear;
    }

    .cover-box {
      position: relative;
      z-index: 1;
    }

    .cover-box {
      width: min(560px, 92vw);
      text-align: center;
      padding: 36px 20px 28px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.46);
      cursor: pointer;
      transform: translateZ(0);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
      outline: none;
    }

    .cover-box:hover,
    .cover-box:focus-visible {
      border-color: rgba(255, 255, 255, 0.48);
      box-shadow: 0 20px 38px rgba(0, 0, 0, 0.32);
    }

    .cover-box:active {
      transform: translateY(1px) scale(0.998);
    }

    .avatar {
      width: 168px;
      height: 168px;
      border-radius: 50%;
      margin: 0 auto 18px;
      border: 4px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      background-image: var(--cover-image);
      background-size: 150%;
      background-position: center top;
      background-color: rgba(255, 255, 255, 0.16);
    }

    .cover-title {
      margin: 0;
      font-size: clamp(1.7rem, 2.9vw, 2.5rem);
      line-height: 1.2;
      letter-spacing: 0.02em;
    }

    .cover-subtitle {
      margin: 10px 0 24px;
      font-size: 1rem;
      opacity: 0.9;
    }
    .subtitle-list {
      margin-bottom: 20px;
    }
    .cover-subline {
      margin: 8px 0 0;
      font-size: 0.88rem;
    }
    .voice-link {
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.92);
      cursor: pointer;
      padding: 0;
      font: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      transform: perspective(520px) rotateX(var(--rot-x, 0deg)) rotateY(var(--rot-y, 0deg)) translateY(0);
      transition: color 0.18s ease, transform 0.1s linear;
      display: inline-block;
    }
    .voice-link:hover {
      color: #ffffff;
      transform: perspective(520px) rotateX(var(--rot-x, 0deg)) rotateY(var(--rot-y, 0deg)) translateY(-1px);
    }
    .voice-link.active {
      color: #ffffff;
      font-weight: 700;
    }
    .voice-link.hobby-voice {
      position: relative;
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 999px;
      border: 0;
      text-decoration: none;
      background: transparent;
      box-shadow: 0 5px 16px rgba(8, 14, 42, 0.1);
      transform: perspective(520px) rotateX(var(--rot-x, 0deg)) rotateY(var(--rot-y, 0deg)) translateY(0) scale(1);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease, color 0.25s ease, background-color 0.25s ease;
      will-change: transform;
      backdrop-filter: blur(2px);
    }
    .voice-link.hobby-voice:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.05);
      transform: perspective(520px) rotateX(var(--rot-x, 0deg)) rotateY(var(--rot-y, 0deg)) translateY(-2px) scale(1.04);
      box-shadow: 0 12px 24px rgba(9, 18, 52, 0.25);
    }
    .voice-link.hobby-voice:active {
      transform: perspective(520px) rotateX(var(--rot-x, 0deg)) rotateY(var(--rot-y, 0deg)) scale(0.96) translateY(0);
      box-shadow: 0 4px 12px rgba(9, 18, 52, 0.1);
      background: rgba(255, 255, 255, 0.1);
    }
    .voice-link.hobby-voice.active {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 12px 26px rgba(9, 18, 52, 0.25);
      transform: perspective(520px) rotateX(var(--rot-x, 0deg)) rotateY(var(--rot-y, 0deg)) translateY(-1px) scale(1.02);
    }
    .voice-wave {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
      margin-left: 6px;
      width: 14px;
      height: 10px;
      opacity: 0;
      transform: translateY(1px);
      transition: opacity 0.18s ease;
    }
    .voice-wave i {
      display: block;
      width: 3px;
      height: 4px;
      border-radius: 999px;
      background: currentColor;
      transform-origin: bottom center;
    }
    .voice-link.active .voice-wave {
      opacity: 1;
    }
    .voice-link.active .voice-wave i:nth-child(1) {
      animation: wave 0.7s ease-in-out infinite;
    }
    .voice-link.active .voice-wave i:nth-child(2) {
      animation: wave 0.7s ease-in-out infinite 0.1s;
    }
    .voice-link.active .voice-wave i:nth-child(3) {
      animation: wave 0.7s ease-in-out infinite 0.2s;
    }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.45); }
      50% { transform: scaleY(1.55); }
    }

    .enter-btn {
      border: 0;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      color: #11215f;
      background: #ffffff;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .enter-btn:hover {
      transform: translateY(-1px);
    }
    .side-nav {
      position: fixed;
      top: 50%;
      width: 50px;
      height: 50px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 50%;
      background: transparent;
      backdrop-filter: blur(6px);
      color: rgba(255, 255, 255, 0.9);
      display: grid;
      place-items: center;
      text-decoration: none;
      z-index: 30;
      opacity: 0.52;
      box-shadow: 0 8px 18px rgba(6, 10, 26, 0.22);
      transition: background-color 0.22s ease, border-color 0.22s ease, transform 0.22s ease, opacity 0.22s ease, box-shadow 0.22s ease;
    }
    .side-nav::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid rgba(130, 170, 255, 0.75);
      opacity: 0;
      transform: scale(0.9);
      pointer-events: none;
    }
    .side-nav:hover,
    .side-nav:focus-visible {
      background: transparent;
      border-color: rgba(255, 255, 255, 0.55);
      opacity: 1;
      box-shadow: 0 10px 22px rgba(6, 10, 26, 0.3);
    }
    .side-nav::before {
      content: "";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 72px;
    }
    .side-nav-prev {
      left: 0;
      transform: translate(-62%, -50%) scale(0.94);
    }
    .side-nav-prev::before {
      left: 100%;
    }
    .side-nav-prev:hover,
    .side-nav-prev:focus-visible,
    .side-nav-prev.near-edge {
      transform: translate(-8%, -50%) scale(1);
    }
    .side-nav-stack {
      position: fixed;
      top: 50%;
      right: 0;
      display: grid;
      gap: 10px;
      z-index: 30;
      transform: translate(48%, -50%) scale(0.94);
      transition: transform 0.22s ease;
    }
    .side-nav-stack::before {
      content: "";
      position: absolute;
      right: 100%;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 100%;
    }
    .side-nav-stack:hover,
    .side-nav-stack:focus-within,
    .side-nav-stack.near-edge {
      transform: translate(8%, -50%) scale(1);
    }
    .side-nav-next,
    .side-nav-top,
    .side-nav-bottom {
      position: relative;
      top: auto;
      right: auto;
      transform: none;
    }
    .side-nav-next::before,
    .side-nav-top::before,
    .side-nav-bottom::before {
      display: none;
    }
    .side-nav-next:hover,
    .side-nav-next:focus-visible,
    .side-nav-top:hover,
    .side-nav-top:focus-visible,
    .side-nav-bottom:hover,
    .side-nav-bottom:focus-visible {
      transform: scale(1.06);
    }
    .side-nav-stack .side-nav.is-near {
      transform: scale(1.12);
      opacity: 1;
      background: transparent;
      color: rgba(255, 255, 255, 0.98);
      border-color: rgba(154, 188, 255, 0.96);
      box-shadow: 0 12px 24px rgba(80, 122, 255, 0.28);
    }
    .side-nav-stack .side-nav.is-near::after {
      opacity: 1;
      animation: navWave 1.1s ease-out infinite;
    }
    .side-nav svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
    }
    @keyframes navWave {
      from {
        transform: scale(0.92);
        opacity: 0.62;
      }
      to {
        transform: scale(1.8);
        opacity: 0;
      }
    }
    @media (max-width: 760px) {
      .side-nav {
        width: 44px;
        height: 44px;
      }
      .side-nav-stack {
        gap: 8px;
        transform: translate(46%, -50%) scale(0.94);
      }
      .side-nav-stack:hover,
      .side-nav-stack:focus-within,
      .side-nav-stack.near-edge {
        transform: translate(8%, -50%) scale(1);
      }
    }
  </style>
</head>
<body>
  <a id="pageTop"></a>
  <a class="side-nav side-nav-prev" href="./page6.html" aria-label="前往上一网页">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M15 5l-7 7 7 7"></path>
    </svg>
  </a>
  <div class="side-nav-stack">
    <a class="side-nav side-nav-top" href="#pageTop" aria-label="回到顶部">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 15l7-7 7 7"></path>
      </svg>
    </a>
    <a class="side-nav side-nav-next" href="./page2.html" aria-label="前往下一网页">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 5l7 7-7 7"></path>
      </svg>
    </a>
    <a class="side-nav side-nav-bottom" href="#pageBottom" aria-label="前往底部">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 9l7 7 7-7"></path>
      </svg>
    </a>
  </div>
  <section class="page-1">
    <div id="coverBox" class="cover-box" role="button" tabindex="0" aria-label="进入我的音乐世界">
      <div class="avatar"></div>
      <h1 class="cover-title">~8歌歌歌~</h1>
      <div class="subtitle-list">
        <p id="coverSubtitle" class="cover-subtitle">粤语唱见</p>
        <p class="cover-subline"><button id="ageVoiceBtn" class="voice-link" type="button" data-src="./assets/media/audio/nianji.mp3" data-label="语音 1">年龄：48岁 体重：480斤 <span class="voice-wave" aria-hidden="true"><i></i><i></i><i></i></span></button></p>
        <p class="cover-subline"><button id="instrumentVoiceBtn" class="voice-link" type="button" data-src="./assets/media/audio/kazudi.mp3" data-label="语音 2">擅长乐器：卡祖笛<span class="voice-wave" aria-hidden="true"><i></i><i></i><i></i></span></button></p>
        <p class="cover-subline"><button id="hobbyVoiceBtn" class="voice-link hobby-voice" type="button" data-src="./assets/media/audio/yumeiren.mp3" data-label="语音 3">特长展示：粤语诗词朗诵<span class="voice-wave" aria-hidden="true"><i></i><i></i><i></i></span></button></p>
      </div>
      <button id="enterBtn" class="enter-btn" type="button">欢迎进入我的音乐世界</button>
    </div>
  </section>
  <audio id="welcomeVoice" preload="auto" src="./assets/media/audio/audio_001.mp3"></audio>
  <audio id="interactionVoice" preload="auto"></audio>
  <audio id="enterClickSound" preload="auto" src="./assets/media/audio/dahuoji.mp3"></audio>
  <a id="pageBottom"></a>

  <script>
    const candidates = [
      "./assets/media/background/bg_001.jpg",
      "./assets/media/background/bg_002.jpg",
      "./assets/media/background/bg_003.jpg"
    ];

    function setCoverImage(src) {
      document.documentElement.style.setProperty("--cover-image", `url("${src}")`);
    }

    function detectImage(index = 0) {
      if (index >= candidates.length) {
        return;
      }
      const img = new Image();
      img.onload = () => setCoverImage(candidates[index]);
      img.onerror = () => detectImage(index + 1);
      img.src = candidates[index];
    }

    const pageSection = document.querySelector(".page-1");
    const coverBox = document.getElementById("coverBox");
    const enterBtn = document.getElementById("enterBtn");
    const coverSubtitle = document.getElementById("coverSubtitle");
    const voiceLinks = document.querySelectorAll(".voice-link");
    const ageVoiceBtn = document.getElementById("ageVoiceBtn") || voiceLinks[0] || null;
    const instrumentVoiceBtn = document.getElementById("instrumentVoiceBtn") || voiceLinks[1] || null;
    const hobbyVoiceBtn = document.getElementById("hobbyVoiceBtn") || voiceLinks[2] || null;
    const welcomeVoice = document.getElementById("welcomeVoice");
    const interactionVoice = document.getElementById("interactionVoice");
    const enterClickSound = document.getElementById("enterClickSound");
    function buildVoiceSourceCandidates(button, fileName) {
      return [...new Set([
        `./assets/media/audio/${fileName}`,
        button?.dataset?.src
      ].filter((item) => typeof item === "string" && item))];
    }
    const AGE_VOICE_SOURCES = [
      "./assets/media/audio/nianji.mp3",
      "./assets/media/audio/page1/nianji.mp3",
      "./assets/media/audio/page1/年龄.mp3"
    ];
    const INSTRUMENT_VOICE_SOURCES = [
      "./assets/media/audio/kazudi.mp3",
      "./assets/media/audio/page1/kazudi.mp3",
      "./assets/media/audio/page1/卡祖笛.mp3"
    ];
    const HOBBY_VOICE_SOURCES = [
      "./assets/media/audio/yumeiren.mp3",
      "./assets/media/audio/page1/yumeiren.mp3",
      "./assets/media/audio/page1/虞美人.mp3"
    ];
    if (ageVoiceBtn && AGE_VOICE_SOURCES.length > 0) {
      ageVoiceBtn.dataset.src = AGE_VOICE_SOURCES[0];
    }
    if (instrumentVoiceBtn && INSTRUMENT_VOICE_SOURCES.length > 0) {
      instrumentVoiceBtn.dataset.src = INSTRUMENT_VOICE_SOURCES[0];
    }
    if (hobbyVoiceBtn && HOBBY_VOICE_SOURCES.length > 0) {
      hobbyVoiceBtn.dataset.src = HOBBY_VOICE_SOURCES[0];
    }
    const PAGE345_RANDOM_TRACKS = [
      { src: "./assets/media/audio/audio_002.mp3", fallback: "./assets/media/audio/page1/audio_002.mp3", title: "网页3随机曲目" },
      { src: "./assets/media/audio/audio_003.mp3", fallback: "./assets/media/audio/page1/audio_003.mp3", title: "网页4随机曲目" },
      { src: "./assets/media/audio/audio_004.mp3", fallback: "./assets/media/audio/page1/audio_004.mp3", title: "网页5随机曲目" }
    ];
    enterClickSound.volume = 1;
    const sideNavPrev = document.querySelector(".side-nav-prev");
    const sideNavStack = document.querySelector(".side-nav-stack");
    const rightNavButtons = sideNavStack ? Array.from(sideNavStack.querySelectorAll(".side-nav")) : [];
    const ENTER_SOUND_TRANSFER_KEY = "enter_click_sound_transfer";
    let bgPosY = 0;
    let bgPosX = 50;
    let startY = 0;
    let startBgY = 0;
    let draggingSection = false;
    let switchingVoice = false;
    let enteringPage2 = false;
    let enterSoundStartedAt = 0;
    let lastRandomTrackIndex = -1;
    let revealProgress = 0;
    const enterThreshold = 2000;
    let viewScale = 1;
    let viewOffsetX = 0;
    let viewOffsetY = 0;
    let isBgDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragBaseOffsetX = 0;
    let dragBaseOffsetY = 0;
    let voicePlayToken = 0;
    let hasDraggedSection = false;
    let initialPinchDistance = 0;
    let initialPinchScale = 1;

    function enterWorld() {
      sessionStorage.setItem("allowPage2", "1");
      window.location.href = "./page2.html";
    }
    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }
    function extractCssUrl(value) {
      const match = String(value || "").trim().match(/^url\((['"]?)(.+)\1\)$/);
      return match ? match[2] : "";
    }
    const bgViewer = document.createElement("div");
    bgViewer.className = "bg-viewer";
    const bgViewerImage = document.createElement("img");
    bgViewerImage.alt = "背景图";
    const rootStyle = getComputedStyle(document.documentElement);
    bgViewerImage.src = extractCssUrl(rootStyle.getPropertyValue("--cover-image")) || "./assets/media/background/bg_001.jpg";
    bgViewer.appendChild(bgViewerImage);
    document.body.appendChild(bgViewer);
    function renderViewerTransform() {
      bgViewerImage.style.transform = `translate(${viewOffsetX}px, ${viewOffsetY}px) scale(${viewScale})`;
    }
    function setFullBgView(enabled) {
      document.body.classList.toggle("full-bg-view", enabled);
      if (!enabled) {
        revealProgress = 0;
        viewScale = 1; // Reset scale on exit
        viewOffsetX = 0;
        viewOffsetY = 0;
      }
    }
    renderViewerTransform();

    function getDistance(touches) {
      if (touches.length < 2) return 0;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    bgViewer.addEventListener("touchstart", (event) => {
      if (!document.body.classList.contains("full-bg-view")) {
        return;
      }
      if (event.touches.length === 2) {
        initialPinchDistance = getDistance(event.touches);
        initialPinchScale = viewScale;
        event.preventDefault();
      } else if (event.touches.length === 1) {
        isBgDragging = true;
        dragStartX = event.touches[0].clientX;
        dragStartY = event.touches[0].clientY;
        dragBaseOffsetX = viewOffsetX;
        dragBaseOffsetY = viewOffsetY;
      }
    }, { passive: false });

    bgViewer.addEventListener("touchmove", (event) => {
      if (!document.body.classList.contains("full-bg-view")) {
        return;
      }
      event.preventDefault(); // Prevent default for both pinch and drag
      if (event.touches.length === 2) {
        const currentDistance = getDistance(event.touches);
        if (initialPinchDistance > 0) {
          const scaleChange = currentDistance / initialPinchDistance;
          viewScale = clamp(initialPinchScale * scaleChange, 0.4, 5.0);
          renderViewerTransform();
        }
      } else if (event.touches.length === 1 && isBgDragging) {
        viewOffsetX = clamp(dragBaseOffsetX + event.touches[0].clientX - dragStartX, -900, 900);
        viewOffsetY = clamp(dragBaseOffsetY + event.touches[0].clientY - dragStartY, -900, 900);
        renderViewerTransform();
      }
    }, { passive: false });

    bgViewer.addEventListener("touchend", () => {
      isBgDragging = false;
    });

    function applyBgPosition(nextX = bgPosX, nextY = bgPosY) {
      bgPosX = Math.max(42, Math.min(58, nextX));
      bgPosY = Math.max(0, Math.min(100, nextY));
      document.documentElement.style.setProperty("--bg-pos-x", `${bgPosX.toFixed(2)}%`);
      document.documentElement.style.setProperty("--bg-pos-y", `${bgPosY.toFixed(2)}%`);
    }
    function resetVoiceUi() {
      coverSubtitle.textContent = "粤语唱见";
      setActiveVoiceLink(null);
    }

    function isSourceInCandidates(candidates, audioElement = welcomeVoice) {
      const currentUrl = new URL(audioElement.currentSrc || audioElement.src || "", window.location.href).href;
      return candidates.some((src) => {
        try {
          return new URL(src, window.location.href).href === currentUrl;
        } catch {
          return false;
        }
      });
    }

    function playRandomSongFrom345(fallbackAttempt = false) {
      if (PAGE345_RANDOM_TRACKS.length === 0) {
        return;
      }
      stopOtherAudio(welcomeVoice);
      
      let randomIndex = fallbackAttempt ? lastRandomTrackIndex : Math.floor(Math.random() * PAGE345_RANDOM_TRACKS.length);
      if (!fallbackAttempt && PAGE345_RANDOM_TRACKS.length > 1 && randomIndex === lastRandomTrackIndex) {
        randomIndex = (randomIndex + 1) % PAGE345_RANDOM_TRACKS.length;
      }
      lastRandomTrackIndex = randomIndex;
      const track = PAGE345_RANDOM_TRACKS[randomIndex];
      
      const targetSrc = fallbackAttempt && track.fallback ? track.fallback : track.src;
      console.log("playRandomSongFrom345 selected track:", track, "using src:", targetSrc);
      
      switchingVoice = true;
      welcomeVoice.muted = false;
      welcomeVoice.volume = 1;
      welcomeVoice.src = targetSrc;
      welcomeVoice.currentTime = 0;

      const playIcon = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>`;
      const pauseIcon = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5h3v14H8z"></path><path d="M13 5h3v14h-3z"></path></svg>`;
      let currentIndex = 0;

      function readFavMap() {
        try {
          const raw = localStorage.getItem(favKey);
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      function writeFavMap(map) {
        localStorage.setItem(favKey, JSON.stringify(map));
      }

      function renderFavState() {
        const map = readFavMap();
        const active = Boolean(map[tracks[currentIndex].src]);
        favBtn.classList.toggle("active", active);
        favBtn.setAttribute("aria-label", active ? "取消收藏" : "收藏");
      }

      function renderPlayState() {
        const paused = audio.paused;
        playBtn.innerHTML = paused ? playIcon : pauseIcon;
        playBtn.setAttribute("aria-label", paused ? "播放" : "暂停");
      }

      function renderTrack(resetTime = true) {
        const track = tracks[currentIndex];
        if (audio.src !== new URL(track.src, window.location.href).href) {
          audio.src = track.src;
        }
        if (resetTime) {
          audio.currentTime = 0;
        }
        cover.src = track.cover;
        title.textContent = track.title;
        sub.textContent = track.sub;
        renderFavState();
      }

      function switchTrack(step) {
        currentIndex = (currentIndex + step + tracks.length) % tracks.length;
        const shouldPlay = !audio.paused;
        renderTrack(true);
        if (shouldPlay) {
          audio.play().catch(() => {});
        }
      }

      prevBtn.addEventListener("click", () => switchTrack(-1));
      nextBtn.addEventListener("click", () => switchTrack(1));
      playBtn.addEventListener("click", () => {
        if (audio.paused) {
          audio.play().catch(() => {});
        } else {
          audio.pause();
        }
      });
      favBtn.addEventListener("click", () => {
        const map = readFavMap();
        const src = tracks[currentIndex].src;
        map[src] = !map[src];
        writeFavMap(map);
        renderFavState();
      });
      audio.addEventListener("ended", () => {
        switchTrack(1);
        audio.play().catch(() => {});
      });
      audio.addEventListener("play", renderPlayState);
      audio.addEventListener("pause", renderPlayState);
      renderTrack(true);
      renderPlayState();
    })();
  </script>
</body>
</html>
